name: "🐛 Bug Report"
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please check existing issues before filing a new one.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps so we can reproduce it reliably.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area affected
      options:
        - Farmer Dashboard
        - Weather Dashboard
        - Crop Advisory
        - Disease Detection
        - Market Prices
        - Government Schemes
        - AI Chat Assistant
        - Notifications
        - Profile / Settings
        - Auth
        - Other / Not sure
    validations:
      required: true
  - type: input
    id: language
    attributes:
      label: Language in use (if relevant)
      placeholder: Hindi / English / Hinglish
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Device, OS, browser/app version, network (e.g. 3G/4G/WiFi)
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Drag and drop images here if helpful.
