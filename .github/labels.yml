# Reference label set for this repo. Can be applied manually or via a
# label-sync GitHub Action (e.g. micnncim/action-label-syncer).

- name: bug
  color: "d73a4a"
  description: Something isn't working
- name: enhancement
  color: "a2eeef"
  description: New feature or request
- name: needs-triage
  color: "ededed"
  description: Not yet reviewed by a maintainer
- name: good first issue
  color: "7057ff"
  description: Good for newcomers
- name: help wanted
  color: "008672"
  description: Extra attention is needed
- name: documentation
  color: "0075ca"
  description: Improvements or additions to documentation
- name: security
  color: "b60205"
  description: Security-related issue (use SECURITY.md for private reports)
- name: performance
  color: "fbca04"
  description: Performance-related work
- name: accessibility
  color: "5319e7"
  description: Accessibility-related work
- name: frontend
  color: "c5def5"
  description: Next.js / React / UI work
- name: backend
  color: "bfd4f2"
  description: Supabase / Edge Functions / server logic
- name: ai
  color: "f9d0c4"
  description: AI provider integration, prompts, or model behavior
- name: i18n
  color: "c2e0c6"
  description: Hindi / English / Hinglish / BHASHINI language support
- name: infra
  color: "e4e669"
  description: CI/CD, deployment, tooling
- name: blocked
  color: "000000"
  description: Blocked on another issue, decision, or external dependency
- name: wontfix
  color: "ffffff"
  description: This will not be worked on
