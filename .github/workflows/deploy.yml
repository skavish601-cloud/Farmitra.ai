name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-vercel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

  deploy-replit-preview:
    runs-on: ubuntu-latest
    if: false # enable once Replit deploy hook/token is configured
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Replit deploy hook
        run: curl -X POST "${{ secrets.REPLIT_DEPLOY_HOOK_URL }}"
